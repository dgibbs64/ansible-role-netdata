---
dependency:
  name: galaxy
driver:
  name: docker
platforms:
  - name: "${MOLECULE_IMAGE:-ubuntu2604}"
    image: "geerlingguy/docker-${MOLECULE_IMAGE:-ubuntu2604}-ansible:latest"
    command: ${MOLECULE_DOCKER_COMMAND:-""}
    volumes:
      - /sys/fs/cgroup:/sys/fs/cgroup:rw
    privileged: true
    pre_build_image: true
    cgroupns_mode: host
provisioner:
  name: ansible
  config_options:
    defaults:
      interpreter_python: auto_silent
  inventory:
    group_vars:
      all:
        ansible_user: root
verifier:
  name: ansible
