---
- name: "Ensure python3-debian and gnupg are installed (Debian Family)"
  ansible.builtin.apt:
    name:
      - gnupg
      - python3-debian
    state: present
    update_cache: true
    cache_valid_time: 3600

- name: "Ensure legacy netdata-repo packages are removed (Debian Family)"
  ansible.builtin.apt:
    name:
      - netdata-repo
      - netdata-repo-edge
    state: absent
    purge: true
  notify: "Update apt cache"

- name: "Ensure legacy netdata repositories are removed (Debian Family) [Legacy]"
  ansible.builtin.deb822_repository:
    name: "{{ item }}"
    state: absent
  loop:
    - netdata-stable
    - netdata-edge
  notify: "Update apt cache"

- name: "Ensure legacy netdata GPG key is removed (Debian Family) [Legacy]"
  ansible.builtin.file:
    path: /etc/apt/trusted.gpg.d/netdata.asc
    state: absent
  notify: "Update apt cache"

- name: "Ensure legacy netdata-stable.list is removed"
  ansible.builtin.file:
    path: "/etc/apt/sources.list.d/netdata-stable.list"
    state: absent
  notify: "Update apt cache"

- name: "Ensure legacy netdata-edge.list is removed"
  ansible.builtin.file:
    path: "/etc/apt/sources.list.d/netdata-edge.list"
    state: absent
  notify: "Update apt cache"

- name: "Determine repository channel to remove (opposite of selected)"
  ansible.builtin.set_fact:
    netdata_agent_channel_remove: "{{ 'edge' if netdata_agent_channel == 'stable' else 'stable' }}"

- name: "Add Netdata repository (deb822) for channel {{ netdata_agent_channel }}"
  ansible.builtin.deb822_repository:
    name: netdata-{{ netdata_agent_channel }}
    types: [deb]
    uris: "http://repo.netdata.cloud/repos/{{ netdata_agent_channel }}/{{ ansible_facts['distribution'] | lower }}"
    suites: "{{ ansible_facts['distribution_release'] | lower }}/"
    signed_by: "https://repo.netdata.cloud/netdatabot.gpg.key"
    enabled: true
    state: "{{ 'present' if netdata_agent_state == 'present' else 'absent' }}"
  when: netdata_agent_state in ['present', 'absent']
  notify: "Update apt cache"

- name: "Ensure opposite channel repository is removed (deb822)"
  ansible.builtin.deb822_repository:
    name: netdata-{{ netdata_agent_channel_remove }}
    types: [deb]
    uris: "http://repo.netdata.cloud/repos/{{ netdata_agent_channel_remove }}/{{ ansible_facts['distribution'] | lower }}"
    suites: "{{ ansible_facts['distribution_release'] | lower }}/"
    signed_by: "https://repo.netdata.cloud/netdatabot.gpg.key"
    enabled: true
    state: absent
  when: netdata_agent_state == "present"
  notify:
    - "Remove netdata"
    - "Update apt cache"

- name: "Remove Netdata repository when state=absent (ensure both channels gone)"
  when: netdata_agent_state == "absent"
  notify: "Update apt cache"
  block:
    - name: "Remove stable repository (deb822)"
      ansible.builtin.deb822_repository:
        name: netdata-stable
        types: [deb]
        uris: "http://repo.netdata.cloud/repos/stable/{{ ansible_facts['distribution'] | lower }}"
        suites: "{{ ansible_facts['distribution_release'] | lower }}/"
        signed_by: "https://repo.netdata.cloud/netdatabot.gpg.key"
        enabled: true
        state: absent
    - name: "Remove edge repository (deb822)"
      ansible.builtin.deb822_repository:
        name: netdata-edge
        types: [deb]
        uris: "http://repo.netdata.cloud/repos/edge/{{ ansible_facts['distribution'] | lower }}"
        suites: "{{ ansible_facts['distribution_release'] | lower }}/"
        signed_by: "https://repo.netdata.cloud/netdatabot.gpg.key"
        enabled: true
        state: absent

- name: "Disable unattended-upgrades for Netdata"
  when: not netdata_enable_unattended_upgrades
  ansible.builtin.file:
    path: "/etc/apt/apt.conf.d/50unattended-upgrades-netdata"
    state: absent

- name: "Enable unattended-upgrades for Netdata"
  when: netdata_enable_unattended_upgrades
  ansible.builtin.copy:
    dest: "/etc/apt/apt.conf.d/50unattended-upgrades-netdata"
    content: |
      Unattended-Upgrade::Origins-Pattern {
          "origin=Netdata,codename=${distro_codename},label=Netdata";
      };
    owner: root
    group: root
    mode: "0644"

- name: "Flush handlers"
  ansible.builtin.meta: flush_handlers
